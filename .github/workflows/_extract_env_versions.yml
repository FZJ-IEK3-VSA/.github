# Reusable workflow to extract version bounds from environment.yml
# Place this file at: FZJ-IEK3-VSA/.github/.github/workflows/_extract_env_versions.yml
#
# Usage in other repositories:
#   jobs:
#     extract-versions:
#       uses: FZJ-IEK3-VSA/.github/.github/workflows/_extract_env_versions.yml@main
#       with:
#         library_name: numpy
#
#     test:
#       needs: extract-versions
#       strategy:
#         matrix:
#           library_version: ${{ fromJSON(needs.extract-versions.outputs.versions) }}

name: Extract Environment Versions

on:
    workflow_call:
        inputs:
            library_name:
                description: "Name of the library to extract versions for (e.g., numpy, pandas)"
                required: true
                type: string
            env_file:
                description: "Path to the environment.yml file"
                required: false
                type: string
                default: "environment.yml"
        outputs:
            min_version:
                description: "Minimum version from the constraint (>=X.Y.Z)"
                value: ${{ jobs.extract.outputs.min_version }}
            max_version:
                description: "Maximum version from the constraint (<=X.Y.Z)"
                value: ${{ jobs.extract.outputs.max_version }}
            versions:
                description: "JSON array of [min_version, max_version] for matrix strategy"
                value: ${{ jobs.extract.outputs.versions }}
            dependency_position:
                description: "Position of the dependency in the env file (for _run_single_conda_forge_test.yml)"
                value: ${{ jobs.extract.outputs.dependency_position }}

jobs:
    extract:
        name: Extract ${{ inputs.library_name }} versions
        runs-on: ubuntu-latest
        outputs:
            min_version: ${{ steps.extract.outputs.min_version }}
            max_version: ${{ steps.extract.outputs.max_version }}
            versions: ${{ steps.extract.outputs.versions }}
            dependency_position: ${{ steps.extract.outputs.dependency_position }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
            - name: Extract versions from ${{ inputs.env_file }}
              id: extract
              shell: python
              env:
                  LIBRARY_NAME: ${{ inputs.library_name }}
                  ENV_FILE: ${{ inputs.env_file }}
              run: |
                  import json
                  import os
                  import re
                  from pathlib import Path

                  def parse_version_constraint(constraint):
                      """Parse a conda version constraint and return (min_version, max_version)."""
                      min_version = None
                      max_version = None

                      # Match patterns like >=1.2.3 or <=4.5.6 or ==1.0.0
                      ge_match = re.search(r">=\s*([\d.]+)", constraint)
                      le_match = re.search(r"<=\s*([\d.]+)", constraint)
                      eq_match = re.search(r"==\s*([\d.]+)", constraint)

                      if eq_match:
                          min_version = max_version = eq_match.group(1)
                      else:
                          if ge_match:
                              min_version = ge_match.group(1)
                          if le_match:
                              max_version = le_match.group(1)

                      return min_version, max_version

                  def extract_library_versions(env_file, library_name):
                      """Extract version bounds for a library from environment.yml."""
                      content = Path(env_file).read_text()

                      # Pattern to match library with version constraint
                      pattern = rf"^\s*-\s*{re.escape(library_name)}\s*(.*?)$"

                      for line in content.splitlines():
                          match = re.match(pattern, line, re.IGNORECASE)
                          if match:
                              constraint = match.group(1).strip()
                              min_ver, max_ver = parse_version_constraint(constraint)

                              # Calculate dependency position
                              lines = content.splitlines()
                              in_deps = False
                              dep_count = 0
                              for i, l in enumerate(lines):
                                  if "dependencies:" in l:
                                      in_deps = True
                                      continue
                                  if in_deps:
                                      stripped = l.strip()
                                      if stripped.startswith("-") and not stripped.startswith("#"):
                                          dep_count += 1
                                          if re.match(pattern, l, re.IGNORECASE):
                                              break

                              return {
                                  "min_version": min_ver or "",
                                  "max_version": max_ver or "",
                                  "versions": json.dumps([v for v in [min_ver, max_ver] if v]),
                                  "dependency_position": str(dep_count),
                              }

                      return {
                          "min_version": "",
                          "max_version": "",
                          "versions": "[]",
                          "dependency_position": "0",
                      }

                  # Main execution
                  library_name = os.environ["LIBRARY_NAME"]
                  env_file = os.environ["ENV_FILE"]

                  result = extract_library_versions(env_file, library_name)

                  # Write to GITHUB_OUTPUT
                  github_output = os.environ.get("GITHUB_OUTPUT", "")
                  if github_output:
                      with open(github_output, "a") as f:
                          for key, value in result.items():
                              f.write(f"{key}={value}\n")

                  # Print for debugging
                  print(f"Library: {library_name}")
                  print(f"Min version: {result['min_version']}")
                  print(f"Max version: {result['max_version']}")
                  print(f"Versions JSON: {result['versions']}")
                  print(f"Dependency position: {result['dependency_position']}")

            - name: Print extracted versions
              run: |
                  echo "======================================"
                  echo "Extracted versions for: ${{ inputs.library_name }}"
                  echo "======================================"
                  echo "Min version:          ${{ steps.extract.outputs.min_version }}"
                  echo "Max version:          ${{ steps.extract.outputs.max_version }}"
                  echo "Versions (JSON):      ${{ steps.extract.outputs.versions }}"
                  echo "Dependency position:  ${{ steps.extract.outputs.dependency_position }}"
                  echo "======================================"
