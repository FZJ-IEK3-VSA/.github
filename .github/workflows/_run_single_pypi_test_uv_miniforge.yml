name: Install software from PyPI (uv + miniforge) and run tests

on:
  workflow_call:
    inputs:
      runner_tag:
        description: "Tag of the runner that should be run"
        required: true
        type: string
      python_version:
        description: "Python version which should be used to setup the environment"
        required: true
        type: string
      additional_conda_forge_dependencies:
        description: "Additional conda-forge dependencies. The complete string must be given with or without version constrain e.g. glpk=5.0 or glpk"
        default: ""
        required: false
        type: string
      additional_conda_channel:
        description: "Additional conda channel to search for packages (e.g. 'defaults' or 'bioconda'). When provided, it is added via -c flag to mamba env create."
        default: ""
        required: false
        type: string
      library_name:
        description: "Name of the library which should be installed for a specific version"
        default: ""
        required: false
        type: string
      library_version:
        description: "Version of the library that should be installed"
        required: false
        type: string
      optional_dependency_PyPI_tag:
        description: "Additional string that is placed after the dot of pip install"
        required: false
        default: ""
        type: string
      ipynb_example_folder:
        description: "Name of folder which contains ipynb examples that should be executed as a test"
        default: "No Example Folder"
        required: false
        type: string
      examples_to_execute:
        description: "Relative path string of examples that should be executed"
        default: "No Examples"
        required: false
        type: string
      multiprocessing_example_string:
        description: "String to be included to execute examples with multiprocessing. -n auto for automatic determination of runners, -n 2 for two runner 2 -n 3 for 3 runner ..."
        default: ""
        required: false
        type: string
      multiprocessing_pytest_string:
        description: "String to use multiprocessing in pytest. -n auto for automatic determination of runners, -n 2 for two runner 2 -n 3 for 3 runner ..."
        default: ""
        required: false
        type: string
      lfs:
        description: "Whether to checkout with Git LFS"
        default: false
        required: false
        type: boolean
    secrets:
      WLSACCESSID:
        description: "Gurobi WLS access ID for the WLS license."
        required: false
      WLSSECRET:
        description: "Gurobi WLS secret for the WLS license."
        required: false
      LICENSEID:
        description: "Gurobi WLS license ID."
        required: false

defaults:
  run:
    shell: pwsh

jobs:
  run-pypi-test:
    name: "Run test for ${{ inputs.library_name }}=${{ inputs.library_version }} on ${{ inputs.runner_tag }}"
    runs-on: ${{ inputs.runner_tag }}
    env:
      WLSACCESSID: ${{ secrets.WLSACCESSID }}
      WLSSECRET: ${{ secrets.WLSSECRET }}
      LICENSEID: ${{ secrets.LICENSEID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: ${{ inputs.lfs }}
      - uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: 25.11.0-1
          channels: conda-forge
          activate-environment: ""
          conda-remove-defaults: "true"
      - name: Setup Python Environment from conda-forge
        run: |
          ls
          echo "LS Done"
          mamba env create --name test_env python=${{ inputs.python_version }} uv ${{ inputs.additional_conda_forge_dependencies }} ${{ inputs.additional_conda_channel != '' && format('-c {0}', inputs.additional_conda_channel) || '' }}
          echo "Python setup is done"
          mamba list --name test_env
          echo "Print dependencies from conda forge before installing PyPI dependencies"
      - name: Setup Environment PyPI without additional dependencies
        if: ${{ inputs.library_name == '' }}
        run: |
          ls
          mamba run --name test_env uv pip install .${{ inputs.optional_dependency_PyPI_tag }}
          echo "uv pip installation is done"
          mamba run --name test_env uv pip list
          echo "All dependencies are shown"
          mamba run --name test_env uv pip check
          echo "Checked for dependency conflicts"
      - name: Setup Environment PyPI with additional dependencies
        if: ${{ inputs.library_name != '' }}
        run: |
          ls
          mamba run --name test_env uv pip install .${{ inputs.optional_dependency_PyPI_tag }} "${{ inputs.library_name }}==${{ inputs.library_version }}"
          echo "uv pip installation is done"
          mamba run --name test_env uv pip list
          echo "All dependencies are shown"
          mamba run --name test_env uv pip check
          echo "Checked for dependency conflicts"
      - name: Write Gurobi WLS license file
        run: |
          if ($env:WLSACCESSID -and $env:WLSSECRET -and $env:LICENSEID) {
            $content = "WLSACCESSID=$env:WLSACCESSID`nWLSSECRET=$env:WLSSECRET`nLICENSEID=$env:LICENSEID`n"
            [IO.File]::WriteAllText((Join-Path $HOME "gurobi.lic"), $content)
            echo "Gurobi WLS license file written to $HOME/gurobi.lic"
          } else {
            echo "No Gurobi WLS credentials found, skipping license file creation"
          }
      - name: Run Pytest
        run: |
          echo "start pytest"
          mamba run --name test_env pytest ${{ inputs.multiprocessing_pytest_string }} -vv
          echo "Pytest done"
      - name: Run all Examples PyPI
        if: ${{ inputs.ipynb_example_folder != 'No Example Folder' }}
        run: |
          mamba run --name test_env python -m pytest ${{ inputs.multiprocessing_example_string }} -vv --dist loadscope --nbval-lax --nbval-current-env --nbval-cell-timeout=900000 --durations=20 ${{ inputs.ipynb_example_folder }}/
      - name: Run Selected Examples PyPI
        if: ${{ inputs.examples_to_execute != 'No Examples' }}
        run: |
          mamba run --name test_env python -m pytest ${{ inputs.multiprocessing_example_string }} -vv --dist loadscope --nbval-lax --nbval-current-env --nbval-cell-timeout=900000 --durations=20 ${{ inputs.examples_to_execute }}
